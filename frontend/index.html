<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Indian Movie Charades 🎬</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --red:#e50914; --red-deep:#8c0610; --gold:#f5c518; --ink:#0a0506;
      --muted:#e6a6ab;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: 'Poppins', system-ui, sans-serif;
      color: #fff;
      position: relative;
      overflow-x: hidden;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background:
        radial-gradient(ellipse 90% 55% at 50% -8%, rgba(229,9,20,0.40), transparent 60%),
        radial-gradient(circle at 50% 28%, #2a0a0e 0%, #150406 48%, #070406 100%);
    }
    /* vignette over everything but UI */
    body::after{
      content:''; position:fixed; inset:0; pointer-events:none; z-index:2;
      background: radial-gradient(ellipse at center, transparent 52%, rgba(0,0,0,0.7) 100%);
    }

    /* ── cinema background: film reels + film-strip edges ── */
    .bg { position: fixed; inset: 0; overflow: hidden; pointer-events: none; z-index: 0; }
    .reel {
      position: absolute; width: 420px; height: 420px; opacity: 0.10;
      background: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'><g fill='none' stroke='%23e50914' stroke-width='7'><circle cx='100' cy='100' r='93'/><circle cx='100' cy='100' r='24'/></g><g fill='%23e50914'><circle cx='100' cy='38' r='16'/><circle cx='154' cy='69' r='16'/><circle cx='154' cy='131' r='16'/><circle cx='100' cy='162' r='16'/><circle cx='46' cy='131' r='16'/><circle cx='46' cy='69' r='16'/></g></svg>") center/contain no-repeat;
      animation: spin 26s linear infinite;
    }
    .reel.r1 { top: -110px; left: -120px; }
    .reel.r2 { bottom: -130px; right: -130px; animation-duration: 34s; animation-direction: reverse; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .filmstrip {
      position: fixed; top: 0; bottom: 0; width: 30px; z-index: 1; opacity: 0.55;
      background: #0b0608;
      background-image: repeating-linear-gradient(to bottom, transparent 0 13px, rgba(229,9,20,0.22) 13px 24px);
      border-left: 2px solid rgba(229,9,20,0.30); border-right: 2px solid rgba(229,9,20,0.30);
    }
    .filmstrip.left { left: 0; } .filmstrip.right { right: 0; }
    @media (max-width: 680px){ .filmstrip { display: none; } }

    #app {
      position: relative; z-index: 3;
      width: 100%; max-width: 600px; padding: 24px;
      display: flex; flex-direction: column; align-items: center; gap: 28px;
    }

    .header { text-align: center; }
    .header h1 {
      font-family: 'Bebas Neue', sans-serif; font-weight: 400;
      font-size: 4.2rem; line-height: 0.92; letter-spacing: 2px;
      text-shadow: 0 0 22px rgba(229,9,20,0.75), 0 3px 0 var(--red-deep);
    }
    .header h1 .accent { color: var(--gold); }
    .header p {
      font-family: 'Oswald', sans-serif; color: var(--muted);
      font-size: 0.95rem; letter-spacing: 3px; text-transform: uppercase; margin-top: 8px;
    }

    .lamp {
      font-size: 5.5rem; user-select: none;
      animation: float 3s ease-in-out infinite;
      filter: drop-shadow(0 0 24px rgba(245,197,24,0.6));
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-14px); }
    }

    /* ── card (projection screen) ── */
    .card {
      background: linear-gradient(180deg, rgba(32,9,12,0.86), rgba(12,5,7,0.92));
      border: 1px solid rgba(229,9,20,0.42);
      border-radius: 18px;
      padding: 34px 28px;
      width: 100%;
      text-align: center;
      backdrop-filter: blur(8px);
      box-shadow: 0 20px 55px rgba(0,0,0,0.6), inset 0 0 70px rgba(229,9,20,0.16);
    }
    .question-num  { font-family: 'Oswald', sans-serif; font-size: 0.8rem; color: var(--gold); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 14px; }
    .question-text { font-family: 'Oswald', sans-serif; font-size: 1.6rem; font-weight: 600; line-height: 1.35; min-height: 64px; }

    .progress-wrap { width: 100%; background: rgba(255,255,255,0.08); border-radius: 999px; height: 7px; margin-top: 22px; overflow: hidden; }
    .progress-bar  { height: 100%; border-radius: 999px; background: linear-gradient(90deg, var(--red), var(--gold)); box-shadow: 0 0 12px rgba(229,9,20,0.7); transition: width 0.4s ease; }

    /* ── buttons ── */
    .btn-row { display: flex; gap: 14px; width: 100%; justify-content: center; flex-wrap: wrap; }

    button {
      font-family: 'Poppins', sans-serif;
      flex: 1; max-width: 170px; padding: 16px 12px;
      border: none; border-radius: 14px;
      font-size: 1.02rem; font-weight: 700; letter-spacing: 0.3px; color: #fff;
      cursor: pointer; transition: transform 0.1s, box-shadow 0.15s, opacity 0.2s;
    }
    button:active { transform: scale(0.94); }
    button:disabled { opacity: 0.4; cursor: default; }
    button:not(:disabled):hover { transform: translateY(-3px); box-shadow: 0 10px 28px rgba(0,0,0,0.55); }

    .btn-yes   { background: linear-gradient(135deg, #1db954, #11823c); }
    .btn-no    { background: linear-gradient(135deg, var(--red), var(--red-deep)); }
    .btn-dunno { background: rgba(255,255,255,0.12); color: var(--muted); }

    .btn-primary {
      flex: unset; max-width: 280px; padding: 18px 30px;
      background: linear-gradient(135deg, var(--red), var(--gold));
      color: #fff; border-radius: 14px;
      font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1.5px;
      box-shadow: 0 8px 30px rgba(229,9,20,0.45);
    }

    .btn-back {
      flex: unset; max-width: unset; padding: 10px 18px;
      background: transparent; color: var(--muted);
      border: 1px solid rgba(229,9,20,0.32); border-radius: 10px;
      font-size: 0.82rem; font-weight: 600; letter-spacing: 0.5px;
    }
    .btn-back:not(:disabled):hover { color: var(--gold); border-color: var(--gold); transform: translateY(-2px); }

    .stumper-input {
      width: 100%; max-width: 360px; padding: 14px 16px;
      background: rgba(255,255,255,0.06); color: #fff;
      border: 1px solid rgba(229,9,20,0.35); border-radius: 12px;
      font-family: 'Poppins', sans-serif; font-size: 1rem; text-align: center;
    }
    .stumper-input::placeholder { color: #9a6b6f; }
    .stumper-input:focus { outline: none; border-color: var(--gold); }
    .btn-submit {
      flex: unset; width: 100%; max-width: 360px; padding: 15px 24px;
      background: linear-gradient(135deg, var(--red), var(--gold)); color: #fff;
      border-radius: 12px; font-size: 1rem; font-weight: 700; letter-spacing: 0.5px;
      box-shadow: 0 6px 22px rgba(229,9,20,0.4);
    }

    /* ── picker grid ── */
    .picker-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; }
    .picker-btn {
      flex: unset; max-width: unset; padding: 16px 8px;
      background: rgba(255,255,255,0.06); color: #fff; border-radius: 12px;
      font-family: 'Oswald', sans-serif; font-size: 1rem; font-weight: 600; letter-spacing: 0.5px;
      border: 1px solid rgba(229,9,20,0.30);
    }
    .picker-btn:not(:disabled):hover { background: rgba(229,9,20,0.18); border-color: var(--gold); color: var(--gold); transform: translateY(-3px); }

    /* ── guess cards ── */
    .guesses { display: flex; flex-direction: column; gap: 12px; width: 100%; }
    .guess-card {
      background: linear-gradient(180deg, rgba(32,9,12,0.82), rgba(12,5,7,0.88));
      border: 1px solid rgba(229,9,20,0.30);
      border-radius: 14px; padding: 16px 20px;
      display: flex; align-items: center; gap: 16px; cursor: pointer;
      transition: transform 0.1s, border-color 0.15s, box-shadow 0.15s;
    }
    .guess-card:hover { transform: translateX(5px); border-color: var(--gold); }
    .guess-card.top   { border-color: var(--gold); background: linear-gradient(180deg, rgba(245,197,24,0.16), rgba(32,9,12,0.85)); box-shadow: 0 0 30px rgba(245,197,24,0.2); }

    .rank       { font-size: 1.7rem; min-width: 38px; text-align: center; }
    .guess-info { flex: 1; text-align: left; }
    .guess-title { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 1.15rem; }
    .guess-meta  { font-size: 0.82rem; color: var(--muted); margin-top: 3px; }
    .confidence  { font-family: 'Oswald', sans-serif; font-size: 0.95rem; font-weight: 700; color: var(--ink); background: var(--gold); border-radius: 999px; padding: 5px 12px; white-space: nowrap; }

    /* ── result ── */
    .result-icon  { font-size: 4.5rem; filter: drop-shadow(0 0 20px rgba(245,197,24,0.5)); }
    .result-title { font-family: 'Oswald', sans-serif; font-size: 1.7rem; font-weight: 700; margin-top: 12px; }
    .result-sub   { color: var(--muted); font-size: 0.95rem; margin-top: 6px; }

    .hidden { display: none !important; }
    .info { color: #c98c90; font-size: 0.85rem; text-align: center; letter-spacing: 0.5px; }


    .logo-img {
      position: fixed; bottom: 14px; right: 18px; z-index: 10;
      max-height: 24px; width: auto; opacity: 0.7;
    }
    .logo-img:hover { opacity: 1; }
    .dots::after { content: ''; animation: dots 1.2s steps(3, end) infinite; }
    @keyframes dots { 0% { content: ''; } 33% { content: '.'; } 66% { content: '..'; } 100% { content: '...'; } }
  </style>
</head>
<body>
<div class="bg">
  <div class="reel r1"></div>
  <div class="reel r2"></div>
</div>
<div class="filmstrip left"></div>
<div class="filmstrip right"></div>
<div id="app">
  <div class="header">    <h1>🎬 Indian Movie <span class="accent">Charades</span></h1>
    <p>Think of any Indian movie — I'll guess it!</p>
  </div>

  <!-- IDLE -->
  <div id="screen-idle">
    <div class="lamp">🪔</div>
    <button class="btn-primary" onclick="startGame()">Start Game</button>
    <p class="info" style="margin-top:8px">Think of a movie, then press Start</p>
  </div>

  <!-- QUESTION (yes/no) -->
  <div id="screen-question" class="hidden" style="width:100%;display:flex;flex-direction:column;align-items:center;gap:20px">
    <div class="card">
      <div class="question-num" id="q-num">Question 1</div>
      <div class="question-text" id="q-text">Loading<span class="dots"></span></div>
      <div class="progress-wrap">
        <div class="progress-bar" id="progress" style="width:0%"></div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn-yes"   onclick="answer('yes')"   id="btn-yes">✅ Yes</button>
      <button class="btn-no"    onclick="answer('no')"    id="btn-no">❌ No</button>
      <button class="btn-dunno" onclick="answer('dunno')" id="btn-dunno">🤷 Don't know</button>
    </div>
    <button class="btn-back hidden" id="back-question" onclick="goBack()">← Back · change my last answer</button>
    <p class="info" id="candidates-info"></p>
  </div>

  <!-- PICKER (language / era) -->
  <div id="screen-picker" class="hidden" style="width:100%;display:flex;flex-direction:column;align-items:center;gap:20px">
    <div class="card">
      <div class="question-num" id="picker-num">Step 1 of 2</div>
      <div class="question-text" id="picker-text"></div>
    </div>
    <div class="picker-grid" id="picker-grid"></div>
    <button class="btn-back hidden" id="back-picker" onclick="goBack()">← Back · change my last answer</button>
    <p class="info" id="picker-info"></p>
  </div>

  <!-- GUESS (stepped right/wrong confirmation) -->
  <div id="screen-guess" class="hidden" style="width:100%;display:flex;flex-direction:column;align-items:center;gap:20px">
    <div class="card">
      <div class="question-num" id="guess-step">My guess</div>
      <div class="result-icon">🎬</div>
      <div class="question-text" id="guess-q">…</div>
      <div class="guess-meta" id="guess-meta" style="margin-top:10px"></div>
    </div>
    <div class="btn-row">
      <button class="btn-yes" id="guess-yes" onclick="guessYes()">✅ Yes!</button>
      <button class="btn-no"  id="guess-no"  onclick="guessNo()">❌ Nope</button>
    </div>
  </div>

  <!-- RESULT -->
  <div id="screen-result" class="hidden" style="width:100%;display:flex;flex-direction:column;align-items:center;gap:20px">
    <div class="card" style="display:flex;flex-direction:column;align-items:center;gap:8px">
      <div class="result-icon"  id="result-icon">🎉</div>
      <div class="result-title" id="result-title"></div>
      <div class="result-sub"   id="result-sub"></div>
    </div>
    <div id="stumper-box" class="hidden" style="display:flex;flex-direction:column;align-items:center;gap:14px;width:100%;padding:20px 0 4px;margin-top:4px;border-top:1px solid rgba(229,9,20,0.25)">
      <input class="stumper-input" id="stumper-input" type="text" placeholder="What was the movie?" autocomplete="off" />
      <button class="btn-submit" id="stumper-submit" onclick="submitStumper()">📩 Tell the genie</button>
      <p class="info" id="stumper-thanks"></p>
    </div>
    <button class="btn-primary" style="margin-top:8px" onclick="playAgain()">🔄 Play Again</button>
  </div>
</div>

<script>
  // Same-origin when served by the backend (deployed); localhost only for
  // opening the file directly during local dev.
  const API = location.protocol === 'file:' ? 'http://localhost:8000' : '';
  const MAX_Q = 20;

  let state = { sessionId: null, questionId: null, userQNum: 0 };

  const LANGUAGE_IDS = new Set(['q_hindi','q_tamil','q_telugu']);
  const ERA_IDS      = new Set(['q_classic','q_90s','q_2000s','q_2010s','q_2020s']);
  const GENRE_IDS    = new Set(['q_genre_action','q_genre_comedy','q_genre_romance',
                                 'q_genre_drama','q_genre_thriller','q_genre_scifi','q_genre_other']);

  // Fallback options if backend returns group:null (stale server or version mismatch)
  const GROUP_OPTIONS = {
    language: [
      {id:'q_hindi',label:'Hindi'},{id:'q_tamil',label:'Tamil'},{id:'q_telugu',label:'Telugu'},
    ],
    era: [
      {id:'q_classic',label:'Before 1990'},{id:'q_90s',label:'1990s'},
      {id:'q_2000s',label:'2000s'},{id:'q_2010s',label:'2010s'},{id:'q_2020s',label:'2020s'},
    ],
    genre: [
      {id:'q_genre_action',label:'Action'},{id:'q_genre_comedy',label:'Comedy'},
      {id:'q_genre_romance',label:'Romance'},{id:'q_genre_drama',label:'Drama / Family'},
      {id:'q_genre_thriller',label:'Thriller / Crime'},{id:'q_genre_scifi',label:'Sci-Fi / Fantasy'},
      {id:'q_genre_other',label:'Historical / Biopic / Horror / Sports'},
    ],
  };

  function resolveGroup(q) {
    if (q.group) return q.group;
    if (LANGUAGE_IDS.has(q.id)) return 'language';
    if (ERA_IDS.has(q.id))      return 'era';
    if (GENRE_IDS.has(q.id))    return 'genre';
    return null;
  }

  function show(screenId) {
    ['idle','question','picker','guess','result'].forEach(s =>
      document.getElementById(`screen-${s}`).classList.toggle('hidden', s !== screenId)
    );
  }

  function setYesNoEnabled(enabled) {
    ['btn-yes','btn-no','btn-dunno'].forEach(id =>
      document.getElementById(id).disabled = !enabled
    );
  }

  // ── start ──────────────────────────────────────────────────────────────
  async function startGame() {
    show('question');
    setYesNoEnabled(false);
    document.getElementById('q-text').innerHTML = 'Loading<span class="dots"></span>';

    const res  = await fetch(`${API}/game/start`, { method: 'POST' });
    const data = await res.json();

    state.sessionId = data.session_id;
    handleResponse(data);
  }

  // ── route response to right screen ────────────────────────────────────
  function handleResponse(data) {
    state.canBack = !!data.can_go_back;
    if (data.phase === 'guess' || data.guesses) {
      renderGuesses(data.guesses);
      return;
    }
    const q = data.question;
    if (!q) { renderGuesses([]); return; }

    state.questionId = q.id;

    const grp = resolveGroup(q);
    if (grp) {
      q.group   = grp;
      q.options = q.options || GROUP_OPTIONS[grp];
      renderPicker(q, data.remaining_candidates);
    } else {
      renderQuestion(q, data.remaining_candidates);
    }
  }

  // ── yes/no question ───────────────────────────────────────────────────
  function renderQuestion(q, remaining) {
    document.getElementById('q-num').textContent  = `Question ${state.userQNum + 1}`;
    document.getElementById('q-text').textContent = q.text;
    document.getElementById('progress').style.width = `${(state.userQNum / 18) * 100}%`;
    document.getElementById('candidates-info').textContent = '';
    setYesNoEnabled(true);
    document.getElementById('back-question').classList.toggle('hidden', !state.canBack);
    show('question');
  }

  async function answer(ans) {
    setYesNoEnabled(false);
    state.userQNum++;
    document.getElementById('q-text').innerHTML = 'Thinking<span class="dots"></span>';

    const res = await fetch(`${API}/game/answer`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: state.sessionId, question_id: state.questionId, answer: ans }),
    });
    handleResponse(await res.json());
  }

  // ── back / change last answer ─────────────────────────────────────────
  async function goBack() {
    document.querySelectorAll('.btn-back').forEach(b => b.disabled = true);
    setYesNoEnabled(false);
    state.userQNum = Math.max(0, state.userQNum - 1);
    const res = await fetch(`${API}/game/back`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: state.sessionId }),
    });
    const data = await res.json();
    document.querySelectorAll('.btn-back').forEach(b => b.disabled = false);
    handleResponse(data);
  }

  // ── picker (language / era / genre) ──────────────────────────────────
  const PICKER_LABELS = { language: 'Step 1 of 3 · Language', era: 'Step 2 of 3 · Era', genre: 'Step 3 of 3 · Theme' };
  function renderPicker(q, remaining) {
    document.getElementById('picker-num').textContent  = PICKER_LABELS[q.group] || q.group;
    document.getElementById('picker-text').textContent = q.text;
    document.getElementById('picker-info').textContent = '';

    const grid = document.getElementById('picker-grid');
    grid.innerHTML = '';
    (q.options || []).forEach(opt => {
      const btn = document.createElement('button');
      btn.className   = 'picker-btn';
      btn.textContent = opt.label;
      btn.onclick     = () => pickOption(opt.id, q.group, q.options);
      grid.appendChild(btn);
    });

    document.getElementById('back-picker').classList.toggle('hidden', !state.canBack);
    show('picker');
  }

  async function pickOption(chosenId, group, options) {
    // Disable all picker buttons
    document.querySelectorAll('.picker-btn').forEach(b => b.disabled = true);

    const allIds = (options || [])
      .map(o => o.id)
      .filter(id => LANGUAGE_IDS.has(id) || ERA_IDS.has(id) || GENRE_IDS.has(id));

    if (chosenId === '__other__') {
      // Batch-answer "no" to all specific language questions
      const answers = allIds.map(id => ({ question_id: id, answer: 'no' }));
      const res = await fetch(`${API}/game/batch-answer`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: state.sessionId, answers }),
      });
      handleResponse(await res.json());
    } else {
      // Answer "yes" to chosen — backend auto-no's the siblings
      const res = await fetch(`${API}/game/answer`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: state.sessionId, question_id: chosenId, answer: 'yes' }),
      });
      handleResponse(await res.json());
    }
  }

  // ── guesses: stepped right/wrong confirmation ─────────────────────────
  let guessRound = { list: [], idx: 0 };

  function renderGuesses(guesses) {
    if (!guesses || guesses.length === 0) { giveUp(); return; }
    guessRound = { list: guesses, idx: 0 };
    showGuess();
    show('guess');
  }

  function showGuess() {
    const g = guessRound.list[guessRound.idx];
    const n = guessRound.list.length;
    document.getElementById('guess-step').textContent =
      n > 1 ? `My guess · ${guessRound.idx + 1} of ${n}` : 'My guess';
    document.getElementById('guess-q').textContent = `Is it “${g.title}” (${g.year})?`;
    document.getElementById('guess-meta').innerHTML =
      `${cap(g.language)} · Dir: ${g.director || '—'} · ⭐ ${g.imdb_rating} · <b>${g.confidence}% sure</b>`;
    document.getElementById('guess-yes').disabled = false;
    document.getElementById('guess-no').disabled  = false;
  }

  // player says it's RIGHT
  function guessYes() {
    const g = guessRound.list[guessRound.idx];
    sendFeedback(true, g.id);
    document.getElementById('stumper-box').classList.add('hidden');
    show('result');
    document.getElementById('result-icon').textContent  = '🎉';
    document.getElementById('result-title').textContent = `Got it! ${g.title}`;
    document.getElementById('result-sub').textContent   = `${cap(g.language)} · ${g.year} · ⭐ ${g.imdb_rating}`;
  }

  // player says it's WRONG → try the next guess, or concede
  function guessNo() {
    guessRound.idx++;
    if (guessRound.idx < guessRound.list.length) {
      document.getElementById('guess-no').disabled = true;
      showGuess();
    } else {
      sendFeedback(false, guessRound.list[0] && guessRound.list[0].id);
      giveUp();
    }
  }

  function giveUp() {
    show('result');
    document.getElementById('result-icon').textContent  = '😔';
    document.getElementById('result-title').textContent = 'You stumped me!';
    document.getElementById('result-sub').textContent   = "I couldn't crack this one. What was the movie?";
    const box = document.getElementById('stumper-box');
    box.classList.remove('hidden');
    document.getElementById('stumper-input').value = '';
    document.getElementById('stumper-input').disabled = false;
    document.getElementById('stumper-submit').disabled = false;
    document.getElementById('stumper-thanks').textContent = '';
  }

  async function submitStumper() {
    const input = document.getElementById('stumper-input');
    const title = input.value.trim();
    if (!title) return;
    document.getElementById('stumper-submit').disabled = true;
    input.disabled = true;
    await fetch(`${API}/game/stumped`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: state.sessionId, title }),
    }).catch(() => {});
    document.getElementById('stumper-thanks').textContent = `Thanks — I'll learn “${title}”. 🎬`;
  }

  async function sendFeedback(wasCorrect, movieId) {
    await fetch(`${API}/game/feedback`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: state.sessionId, correct_movie_id: movieId, was_correct: wasCorrect }),
    }).catch(() => {});
  }

  function playAgain() {
    state = { sessionId: null, questionId: null, userQNum: 0 };
    show('idle');
  }

  function cap(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : s; }
</script>
